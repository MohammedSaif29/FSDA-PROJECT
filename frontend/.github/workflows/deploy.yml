name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant permissions to allow the action to push to the gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # Use install instead of ci to be more flexible with lockfile differences
        run: npm install

      - name: Build
        # CI=false prevents the build from failing on warnings (like unused variables)
        run: |
          export CI=false
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
