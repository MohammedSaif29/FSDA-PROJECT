<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EduVault</title>
    <script type="text/javascript">
      
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/index.html' +
        l.search + l.hash
      );
    </script>
  </head>
  <body>
    Redirecting to EduVault...
  </body>
</html>
