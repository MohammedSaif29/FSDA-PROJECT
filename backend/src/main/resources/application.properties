spring.application.name=EduVault
spring.config.import=optional:file:./backend-local.properties,optional:file:./backend/backend-local.properties

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eduvault?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=0203
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.main.allow-circular-references=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.web=INFO

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
jwt.secret=EduVaultJwtSecretKeyForLocalDevelopment2026Secure
jwt.expiration=86400000

# App
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.frontend.oauth-success-url=${FRONTEND_OAUTH_SUCCESS_URL:${app.frontend.url}/#/auth/callback}
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.admin.emails=${APP_ADMIN_EMAILS:admin@eduvault.com,admin@gmail.com}

# Server
server.port=8081
