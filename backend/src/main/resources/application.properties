spring.application.name=EduVault
spring.config.import=optional:file:.env[.properties],optional:file:./.env[.properties],optional:file:./backend/.env[.properties],optional:file:./backend-local.properties,optional:file:./backend/backend-local.properties

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eduvault?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.main.allow-circular-references=true

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.web=INFO

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# App
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.frontend.login-url=${FRONTEND_LOGIN_URL:${app.frontend.url}/login}
app.frontend.oauth-success-url=${FRONTEND_OAUTH_SUCCESS_URL:${app.frontend.url}/auth/callback}
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.admin.emails=${APP_ADMIN_EMAILS:admin@eduvault.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${app.frontend.url},http://localhost:*,http://127.0.0.1:*}
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
app.seed-admin-account=${APP_SEED_ADMIN_ACCOUNT:false}
app.default-admin.username=${APP_DEFAULT_ADMIN_USERNAME:admin}
app.default-admin.email=${APP_DEFAULT_ADMIN_EMAIL:admin@eduvault.com}
app.default-admin.password=${APP_DEFAULT_ADMIN_PASSWORD:}

# Server
server.port=${PORT:8081}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
