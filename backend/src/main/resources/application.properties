spring.application.name=EduVault

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eduvault?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=0203
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.main.allow-circular-references=true

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT
jwt.secret=EduVaultJwtSecretKeyForLocalDevelopment2026Secure
jwt.expiration=86400000

# Static
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# Server
server.port=8081
